services:
  - type: web
    name: podcaster-crm
    env: python
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: podcaster-crm-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false   # you set this manually in Render dashboard
      - key: PYTHON_VERSION
        value: "3.11.9"

databases:
  - name: podcaster-crm-db
    plan: free
    databaseName: podcaster_crm
    user: crm_user
